[agent]
name = "HairyClaw"
data_dir = "./data"
max_iterations_per_run = 25
max_context_tokens = 100000

[health]
port = 9090

[channels.telegram]
enabled = false
mode = "bot"
# session_file used only in mtproto mode
session_file = "./data/telegram/session.txt"

[channels.whatsapp]
enabled = false

[channels.webhook]
enabled = false
port = 8080
secret = ""

[channels.cli]
enabled = true

[providers.anthropic]
enabled = true
default_model = "claude-sonnet-4-20250514"

[providers.openrouter]
enabled = false
default_model = "anthropic/claude-sonnet-4-20250514"

[providers.gemini]
enabled = false
default_model = "gemini-2.5-flash"

[providers.ollama]
enabled = false
base_url = "http://localhost:11434"
default_model = "llama3.2"
# Per-model fallback chain (tried in order, cross-provider).
# Format: "provider/model"
model_fallback_chain = []

[routing]
default_provider = "anthropic"
fallback_chain = ["anthropic", "gemini", "openrouter", "ollama"]

[routing.cost]
track = true
daily_budget_usd = 10.0
alert_threshold_pct = 80

[growth]
reflection_enabled = true
initiative_enabled = false
skill_auto_promote = false

[resilience]
# Auth profile cooldown settings
cooldown_base_ms = 15000
cooldown_max_ms = 300000
cooldown_threshold = 1
# Per-request LLM timeout
request_timeout_ms = 120000

[delivery]
# Outbound message retry
max_attempts = 5
base_retry_ms = 5000
max_retry_ms = 300000

[memory]
# Auto-preload relevant memories into system prompt
auto_preload = true
preload_top_k = 3
preload_min_score = 0.3
preload_max_chars = 2000

[tools.bash]
timeout_ms = 30000
max_output_bytes = 1048576

[tools.sidecar]
auto_build = true
health_check_interval_ms = 30000
