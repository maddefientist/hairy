[agent]
name = "HairyClaw"
data_dir = "./data"
max_iterations_per_run = 25
max_context_tokens = 100000

[health]
port = 9090

[channels.telegram]
enabled = false
mode = "bot"
# session_file used only in mtproto mode
session_file = "./data/telegram/session.txt"

[channels.whatsapp]
enabled = false

[channels.webhook]
enabled = false
port = 8080
secret = ""

[channels.cli]
enabled = true

[providers.anthropic]
enabled = true
default_model = "claude-sonnet-4-20250514"

[providers.openrouter]
enabled = false
default_model = "anthropic/claude-sonnet-4-20250514"

[providers.gemini]
enabled = false
default_model = "gemini-2.5-flash"

[providers.ollama]
enabled = false
base_url = "http://localhost:11434"
default_model = "llama3.2"
# Per-model fallback chain (tried in order, cross-provider).
# Format: "provider/model"
model_fallback_chain = []

[routing]
default_provider = "anthropic"
fallback_chain = ["anthropic", "gemini", "openrouter", "ollama"]

[routing.cost]
track = true
daily_budget_usd = 10.0
alert_threshold_pct = 80

[growth]
reflection_enabled = true
initiative_enabled = false
skill_auto_promote = false

[resilience]
# Auth profile cooldown settings
cooldown_base_ms = 15000
cooldown_max_ms = 300000
cooldown_threshold = 1
# Per-request LLM timeout
request_timeout_ms = 120000

[delivery]
# Outbound message retry
max_attempts = 5
base_retry_ms = 5000
max_retry_ms = 300000

[memory]
# Auto-preload relevant memories into system prompt
auto_preload = true
preload_top_k = 3
preload_min_score = 0.3
preload_max_chars = 2000

[memory.structured]
enabled = true
file_path = "./data/memory/structured.json"
max_facts = 100
confidence_threshold = 0.7
max_injection_chars = 2000

[plugins.summarization]
enabled = true
trigger_tokens = 80000
keep_messages = 20
max_tool_result_chars = 500

[plugins.loop_detection]
enabled = true
warn_threshold = 3
hard_limit = 5
window_size = 20

[mcp]
enabled = false

# Example MCP server configurations (uncomment to use):
# [[mcp.servers]]
# name = "filesystem"
# enabled = true
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
# description = "Filesystem access via MCP"

[subagent]
max_concurrent = 3
default_timeout_ms = 120000
max_iterations = 10

[uploads]
enabled = true
base_dir = "./data/uploads"
max_file_size_mb = 50
max_files_per_thread = 20
convert_documents = true

[sandbox]
enabled = false
provider = "local"  # "local" | "docker"
base_dir = "./data/threads"

[tools.bash]
timeout_ms = 30000
max_output_bytes = 1048576

[tools.sidecar]
auto_build = true
health_check_interval_ms = 30000
